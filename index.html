<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>玲珑解梦 · 对话录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            overflow-x: hidden;
        }
        .chat-container {
            max-width: 550px; margin: 0 auto; padding: 20px 12px 80px;
            display: flex; flex-direction: column; height: 100vh; overflow-y: auto;
            background: #ffffff;
        }
        .chat-header { text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #d4b483; }
        .chat-header h1 { font-size: 2.2rem; font-weight: 600; letter-spacing: 6px; color: #6e4e2e; }
        .chat-header p { color: #8b6f50; font-size: 12px; letter-spacing: 3px; }
        .messages { flex: 1; display: flex; flex-direction: column; gap: 18px; }
        .message { display: flex; max-width: 85%; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }
        .bubble {
            padding: 14px 18px; border-radius: 20px; line-height: 1.6; font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); word-break: break-word;
        }
        .user .bubble { background: #f5efe7; border: 1px solid #b89b5e; color: #3e2c1b; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #faf8f5; border: 1px solid #c4a77a; color: #3e2c1b; border-bottom-left-radius: 4px; }
        .assistant .bubble.loading { color: #9e8b6b; font-style: italic; }
        .assistant .bubble.error { color: #b85c5c; border-color: #d4a0a0; }
        .time { font-size: 10px; color: #9e8b6b; margin-top: 4px; margin-left: 8px; }
        .input-area {
            position: sticky; bottom: 10px; margin-top: 20px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px); border-radius: 50px; border: 1px solid #b89b5e;
            padding: 6px 6px 6px 20px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .input-area input { flex: 1; background: transparent; border: none; outline: none; color: #3e2c1b; font-size: 16px; font-family: inherit; padding: 12px 0; }
        .input-area input::placeholder { color: #b89b5e; font-style: italic; }
        .input-area button {
            background: #6e4e2e; border: 1px solid #b89b5e; border-radius: 40px; padding: 10px 20px;
            color: #fdf8f2; font-weight: 600; font-family: inherit; font-size: 15px; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .input-area button:hover { background: #8b6239; }
        .footer-actions { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
        .icon-btn {
            background: rgba(255,255,255,0.8); border: 1px solid #b89b5e; border-radius: 30px;
            padding: 6px 18px; color: #6e4e2e; font-size: 14px; font-family: inherit; cursor: pointer;
            backdrop-filter: blur(2px); transition: 0.2s;
        }
        .icon-btn:hover { background: #f5efe7; border-color: #a5834e; }
        .history-drawer {
            position: fixed; bottom: 0; left: 0; width: 100%; max-height: 70vh; background: #fdfbf9;
            backdrop-filter: blur(10px); border-top: 3px solid #b89b5e; border-radius: 30px 30px 0 0;
            z-index: 20; transform: translateY(100%); transition: transform 0.35s ease; padding: 25px 20px;
            overflow-y: auto; color: #3e2c1b; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .history-drawer.open { transform: translateY(0); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #d4b483; padding-bottom: 10px; }
        .history-header h3 { font-size: 24px; color: #6e4e2e; letter-spacing: 4px; }
        .close-history { background: none; border: none; color: #a5834e; font-size: 30px; cursor: pointer; }
        .history-item { border-bottom: 1px solid #e4d5c0; padding: 12px 0; font-size: 14px; }
        .history-item strong { color: #8b6239; }
        .clear-btn { background: #f0e7dd; border: 1px solid #b89b5e; margin-top: 20px; width: 100%; padding: 12px; color: #3e2c1b; font-family: inherit; border-radius: 40px; cursor: pointer; }
        #shareCanvas { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .hint-text { text-align: center; color: #b89b5e; font-size: 11px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="chat-header"><h1>玲珑解梦</h1><p>· 且说梦境 · 自有分晓 ·</p></div>
        <div class="messages" id="messagesContainer"></div>
        <div class="input-area">
            <input type="text" id="dreamInput" placeholder="说说你梦见了什么..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
        <div class="footer-actions">
            <button class="icon-btn" id="historyBtn">📜 梦录阁</button>
            <button class="icon-btn" id="shareBtn">🖼️ 留存墨宝</button>
        </div>
        <div class="hint-text">· 每次解梦皆录于梦阁 ·</div>
    </div>
    <div class="history-drawer" id="historyDrawer">
        <div class="history-header"><h3>📜 往昔梦录</h3><button class="close-history" id="closeHistoryBtn">&times;</button></div>
        <div id="historyList"></div>
        <button class="clear-btn" id="clearHistoryBtn">🗑️ 清空梦录</button>
    </div>
    <canvas id="shareCanvas" width="500" height="700"></canvas>

    <script>
        (function(){
            "use strict";

            // ---------- 配置区：硅基流动（免费，已填入密钥）----------
            const AI_CONFIG = {
                apiKey: 'sk-rsosloxvwmhpscxtjdagkqlbkijwmknrnbuihjcjsshhmmbh',
                url: 'https://api.siliconflow.cn/v1/chat/completions',
                model: 'Qwen/Qwen2.5-7B-Instruct'
            };
            const USE_AI = true;

            // ---------- 本地民俗心理学知识库（精简核心词条，可自行扩充）----------
            const dreamDB = {
                '蛇': { keys: ['蛇','长虫','蟒'], interpret: '蛇者，小龙也。民俗视蛇为财神或祖先显灵，梦蛇入怀主得贵子或遇贵人；若蛇缠身则需防口舌是非。心理学中蛇常代表性本能或潜意识智慧，亦可能暗示你正面临某种隐秘的威胁或转变。' },
                '龙': { keys: ['龙','飞龙','蛟龙'], interpret: '龙乃祥瑞之尊。《周公解梦》云：梦龙飞天，功名显达；乘龙则升迁。心理学认为龙是集体潜意识中的“英雄原型”，代表你渴望突破现状、获得力量与认可。' },
                '掉牙': { keys: ['掉牙','齿落','牙脱'], interpret: '齿为骨之余。民俗：上牙落为长辈忧，下牙落为晚辈念，无痛脱落主旧疾愈。心理学：弗洛伊德认为掉牙梦与阉割焦虑或性压抑有关；现代心理学多解为“丧失感”——对衰老、关系结束或自信动摇的担忧。' },
                '水': { keys: ['水','河流','洪水','溺水'], interpret: '水主财帛与情绪。民俗：清水主吉，浊水主凶，洪水主变故。心理学：水是潜意识的标准象征，水的状态即你情绪的状态。' },
                '考试': { keys: ['考试','科考','答卷'], interpret: '梦赴考场，非为功名，乃心有所惧。民俗：梦高中主吉。心理学：考试梦是典型的“焦虑梦”，反映现实中你正面临被评价、被考验的压力，担心准备不足。' },
                '被追': { keys: ['被追','追赶','逃跑'], interpret: '仓皇奔逃，必有隐忧。民俗：梦被追主口舌。心理学：被追赶梦是你内心在逃避某种情绪、责任或冲突。追你的东西往往就是你不愿面对的问题本身。' },
                '飞翔': { keys: ['飞','飞翔','腾空'], interpret: '身轻如燕，御风而行。民俗：梦飞翔主脱困解厄，若心生欢喜所求可成。心理学：飞翔常代表性释放或对自由的渴望；若飞而坠落则反映现实挫折感。' },
                '坠落': { keys: ['坠落','跌下','失足'], interpret: '如坠深渊。民俗：坠而不伤主虚惊。心理学：坠落梦几乎都与“失控感”有关——对工作、情感或生活失去把握的焦虑。' },
                '死亡': { keys: ['死亡','故去','死人'], interpret: '梦死得生，古之吉兆。民俗：梦他人死反添寿数；梦己死主大运将开。心理学：死亡梦代表“终结”与“转变”，旧我死去，新我诞生。' },
                '鬼': { keys: ['鬼','鬼怪','幽灵'], interpret: '梦鬼多因阳气不足或心中有愧。民俗：梦鬼主口舌或阴事。心理学：鬼代表你压抑的恐惧、内疚或未解决的创伤。' },
                '僵尸': { keys: ['僵尸','丧尸'], interpret: '僵尸主僵化与恐惧。民俗无载，心理学认为僵尸梦常象征你感到被某种僵化的规则、关系或思维模式所困，亦可能是对“失去人性”或“行尸走肉”状态的焦虑。' },
                '外星人': { keys: ['外星人','UFO'], interpret: '外星人象征未知与疏离。心理学中常代表你内心感到与周围环境格格不入，或对未知变化的恐惧与好奇并存。梦之主你渴望突破现有认知框架。' }
            };

            let currentKeyword = '', currentInterpretation = '';
            const messagesContainer = document.getElementById('messagesContainer');
            const dreamInput = document.getElementById('dreamInput');
            const sendBtn = document.getElementById('sendBtn');
            const historyDrawer = document.getElementById('historyDrawer');
            const historyList = document.getElementById('historyList');

            // 本地匹配
            function matchLocal(keyword) {
                const kw = keyword.toLowerCase();
                for (let [name, data] of Object.entries(dreamDB)) {
                    if (kw.includes(name.toLowerCase())) return { name, ...data };
                    for (let k of data.keys) if (kw.includes(k.toLowerCase())) return { name, ...data };
                }
                return null;
            }

            // 硅基流动 AI 调用（免费）
            async function aiInterpret(keyword) {
                const prompt = `你是一位中国古代解梦先生，请用文言与现代汉语结合的古雅风格，为“${keyword}”这个梦境写一段约120字的解读。需融合《周公解梦》民俗与现代心理学视角，语言优美神秘。`;
                console.log(`[AI] 请求硅基流动，关键词: ${keyword}`);
                try {
                    const res = await fetch(AI_CONFIG.url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${AI_CONFIG.apiKey}`
                        },
                        body: JSON.stringify({
                            model: AI_CONFIG.model,
                            messages: [{ role: 'user', content: prompt }],
                            max_tokens: 200,
                            temperature: 0.85
                        })
                    });
                    if (!res.ok) {
                        const err = await res.text();
                        console.error('[AI] 硅基流动错误:', err);
                        return null;
                    }
                    const data = await res.json();
                    const reply = data.choices[0].message.content.trim();
                    console.log('[AI] 成功');
                    return reply;
                } catch(e) {
                    console.error('[AI] 调用失败:', e);
                    return null;
                }
            }

            function addMessage(role, text, isLoading = false, isError = false) {
                const div = document.createElement('div');
                div.className = `message ${role}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble' + (isLoading ? ' loading' : '') + (isError ? ' error' : '');
                bubble.innerText = text;
                div.appendChild(bubble);
                const timeSpan = document.createElement('div');
                timeSpan.className = 'time';
                timeSpan.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                div.appendChild(timeSpan);
                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                return bubble;
            }

            async function handleSend() {
                const query = dreamInput.value.trim();
                if (!query) return;
                
                addMessage('user', `我梦到${query}`);
                dreamInput.value = '';
                
                const loadingBubble = addMessage('assistant', '🤖 AI 解梦司正在推演天机，稍候片刻...', true);
                
                let answer = '';
                let isError = false;
                
                // 1. 优先本地
                const local = matchLocal(query);
                if (local) {
                    answer = local.interpret;
                    console.log('[本地] 命中:', local.name);
                } 
                // 2. AI 兜底
                else if (USE_AI) {
                    const aiAns = await aiInterpret(query);
                    if (aiAns) {
                        answer = aiAns;
                    } else {
                        answer = '🤔 AI 解梦司暂时云游未归，请稍后再试。或可尝试输入更常见的梦境关键词（如“蛇”“掉牙”“考试”）。';
                        isError = true;
                    }
                } 
                // 3. 通用兜底
                else {
                    answer = `关于“${query}”之梦，古籍未有明载。然梦由心生，大抵近日心神所系。宜静坐观心，自有答案。`;
                }
                
                loadingBubble.innerText = answer;
                loadingBubble.classList.remove('loading');
                if (isError) loadingBubble.classList.add('error');
                
                currentKeyword = query;
                currentInterpretation = answer;
                saveToHistory(query, answer);
            }

            function saveToHistory(k, i) {
                const rec = { time: new Date().toLocaleString(), keyword: k, interp: i };
                let his = JSON.parse(localStorage.getItem('dreamHistory')||'[]');
                his.unshift(rec); if(his.length>30) his.pop();
                localStorage.setItem('dreamHistory', JSON.stringify(his));
            }

            function renderHistory() {
                const his = JSON.parse(localStorage.getItem('dreamHistory')||'[]');
                historyList.innerHTML = his.length ? his.map(r=>`
                    <div class="history-item"><strong>🕒 ${r.time}</strong><br>🌙 ${r.keyword}<br>📖 ${r.interp.substring(0,70)}…</div>
                `).join('') : '<div style="text-align:center; padding:20px;">暂无梦录</div>';
            }

            async function shareCard() {
                if(!currentInterpretation) { alert('请先解梦'); return; }
                const canvas = document.getElementById('shareCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width=500; canvas.height=700;
                ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,500,700);
                ctx.fillStyle='#b89b5e'; ctx.globalAlpha=0.1;
                ctx.font='bold 80px "KaiTi"'; ctx.fillText('☯',300,200);
                ctx.globalAlpha=1;
                ctx.font='bold 36px "Noto Serif SC"'; ctx.fillStyle='#6e4e2e'; ctx.textAlign='center';
                ctx.fillText('玲珑解梦',250,80);
                ctx.font='18px serif'; ctx.fillText(new Date().toLocaleDateString(),250,130);
                ctx.font='bold 30px serif'; ctx.fillStyle='#8b6239'; ctx.fillText(`「${currentKeyword}」`,250,220);
                ctx.font='18px serif'; ctx.fillStyle='#3e2c1b';
                const lines = currentInterpretation.split('').reduce((acc,ch)=>{
                    let last=acc[acc.length-1]; if(!last || ctx.measureText(last+ch).width>400) acc.push(ch);
                    else acc[acc.length-1]=last+ch; return acc;
                },['']).filter(l=>l);
                lines.forEach((l,i)=>ctx.fillText(l,250,300+i*35));
                const link=document.createElement('a'); link.download='dream.png';
                link.href=canvas.toDataURL(); link.click();
            }

            function initChat() {
                addMessage('assistant', '你的梦可要解惑？');
            }

            sendBtn.addEventListener('click', handleSend);
            dreamInput.addEventListener('keypress', e => e.key==='Enter' && handleSend());
            document.getElementById('historyBtn').addEventListener('click', ()=>{ renderHistory(); historyDrawer.classList.add('open'); });
            document.getElementById('closeHistoryBtn').addEventListener('click', ()=>historyDrawer.classList.remove('open'));
            document.getElementById('clearHistoryBtn').addEventListener('click', ()=>{
                if(confirm('清空所有梦录？')){ localStorage.removeItem('dreamHistory'); renderHistory(); }
            });
            document.getElementById('shareBtn').addEventListener('click', shareCard);
            
            initChat();
        })();
    </script>
</body>
</html>
